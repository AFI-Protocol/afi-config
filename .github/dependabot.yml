version: 2
updates:
  # npm dependencies (root package.json / package-lock.json)
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'Etc/UTC'
    open-pull-requests-limit: 5
    versioning-strategy: increase
    labels:
      - 'dependencies'
    reviewers:
      - 'Gio2050'
    commit-message:
      prefix: 'chore(deps)'
      prefix-development: 'chore(deps-dev)'
      include: 'scope'
    groups:
      # Batch low-risk minor/patch bumps into a single PR to reduce noise.
      minor-and-patch:
        update-types:
          - 'minor'
          - 'patch'
    ignore:
      # typescript-eslint 8.x peer-requires typescript <6.1.0 (via
      # typescript-estree / ts-api-utils), so a TypeScript major bump (7.x)
      # breaks `npm ci` with ERESOLVE. Hold TS majors until typescript-eslint
      # ships support; minor/patch within the current major still flow through.
      - dependency-name: 'typescript'
        update-types:
          - 'version-update:semver-major'

  # GitHub Actions used by CI / secret-scan workflows.
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'Etc/UTC'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'github-actions'
    reviewers:
      - 'Gio2050'
    commit-message:
      prefix: 'chore(ci)'
      include: 'scope'
