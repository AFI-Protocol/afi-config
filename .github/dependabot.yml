version: 2
updates:
  # npm dependencies (root package.json / package-lock.json)
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'Etc/UTC'
    open-pull-requests-limit: 5
    versioning-strategy: increase
    labels:
      - 'dependencies'
    reviewers:
      - 'Gio2050'
    commit-message:
      prefix: 'chore(deps)'
      prefix-development: 'chore(deps-dev)'
      include: 'scope'
    groups:
      # Batch low-risk minor/patch bumps into a single PR to reduce noise.
      minor-and-patch:
        update-types:
          - 'minor'
          - 'patch'

  # GitHub Actions used by CI / secret-scan workflows.
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'Etc/UTC'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'github-actions'
    reviewers:
      - 'Gio2050'
    commit-message:
      prefix: 'chore(ci)'
      include: 'scope'
