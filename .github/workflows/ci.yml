name: AFI Config CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Check file sizes
        run: npm run check:file-size
      - name: Check formatting
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Detect dead code
        run: npm run dead-code
      - name: Check unused dependencies
        run: npm run deps:check
      - name: Enforce minimum dependency release age
        if: github.event_name == 'pull_request'
        env:
          AFI_MIN_RELEASE_AGE_DAYS: '7'
        run: |
          git fetch origin main --depth=1
          npm run check:dep-release-age
      - name: Detect duplicate code
        run: npm run duplicates
      - name: Track technical debt
        run: npm run check:tech-debt
      - name: Validate AGENTS.md
        run: npm run check:agents-doc
      - name: Run tests with timing + JUnit report
        run: npm run test:ci
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: test-results/
          retention-days: 14
      - name: Enforce test coverage thresholds
        run: npm run test:coverage
      - name: Validate configs
        run: npm run validate:config --if-present || echo "No validation script"
      - name: Build
        run: npm run build --if-present || echo "No build script"
