name: AFI Config CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Check file sizes
        run: npm run check:file-size
      - name: Check formatting
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Detect dead code
        run: npm run dead-code
      - name: Check unused dependencies
        run: npm run deps:check
      - name: Detect duplicate code
        run: npm run duplicates
      - name: Track technical debt
        run: npm run check:tech-debt
      - name: Validate AGENTS.md
        run: npm run check:agents-doc
      - name: Run vitest pin guards
        run: npm run test:run
      - name: Enforce test coverage thresholds
        run: npm run test:coverage
      - name: Validate configs
        run: npm run validate:config --if-present || echo "No validation script"
      - name: Build
        run: npm run build --if-present || echo "No build script"
