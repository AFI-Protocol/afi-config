# Canonical issue/PR label taxonomy for afi-config.
# Synced by .github/workflows/sync-labels.yml using crazy-max/ghaction-github-labeler.
# Categories: priority (P0-P3), type, area, plus standard GitHub defaults.

# --- Priority ---
- name: 'P0'
  color: 'b60205'
  description: 'Critical — blocks work or breaks contracts; act immediately.'
- name: 'P1'
  color: 'd93f0b'
  description: 'High — significant impact; address this sprint.'
- name: 'P2'
  color: 'fbca04'
  description: 'Medium — normal priority.'
- name: 'P3'
  color: '0e8a16'
  description: 'Low — nice-to-have; pick up when free.'

# --- Type ---
- name: 'bug'
  color: 'd73a4a'
  description: 'Something is not working as intended.'
- name: 'enhancement'
  color: 'a2eeef'
  description: 'New feature or capability request.'
- name: 'documentation'
  color: '0075ca'
  description: 'Improvements or additions to documentation.'
- name: 'chore'
  color: 'c5def5'
  description: 'Maintenance, tooling, or dependency work.'
- name: 'refactor'
  color: 'cfd3d7'
  description: 'Code change that neither fixes a bug nor adds a feature.'
- name: 'test'
  color: '1d76db'
  description: 'Test coverage, fixtures, or test infrastructure.'
- name: 'dependencies'
  color: '0366d6'
  description: 'Dependency bumps (Dependabot/Renovate).'

# --- Area (afaf-config specific) ---
- name: 'area:schemas'
  color: '5319e7'
  description: 'JSON schemas in schemas/.'
- name: 'area:registries'
  color: '5319e7'
  description: 'Registry artifacts in registries/.'
- name: 'area:templates'
  color: '5319e7'
  description: 'Config templates in templates/.'
- name: 'area:codex'
  color: '5319e7'
  description: 'Codex metadata and governance (codex/).'
- name: 'area:cli-utils'
  color: '5319e7'
  description: 'Validation utilities and CLI tools (cli_utils/).'
- name: 'area:ci'
  color: '5319e7'
  description: 'CI workflows, hooks, and repo tooling (.github/, scripts/).'
- name: 'area:docs'
  color: '5319e7'
  description: 'Documentation (README, AGENTS.md, docs/).'
- name: 'area:security'
  color: '5319e7'
  description: 'Security-related change (secrets, scanning, permissions).'

# --- Standard GitHub defaults (kept for compatibility) ---
- name: 'duplicate'
  color: 'cfd3d7'
  description: 'This issue or pull request already exists.'
- name: 'good first issue'
  color: '7057ff'
  description: 'Good for newcomers.'
- name: 'help wanted'
  color: '008672'
  description: 'Extra attention is needed.'
- name: 'invalid'
  color: 'e4e669'
  description: "This doesn't seem right."
- name: 'question'
  color: 'd876e3'
  description: 'Further information is requested.'
- name: 'wontfix'
  color: 'ffffff'
  description: 'This will not be worked on.'
